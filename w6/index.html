<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>week 6 - Calculating your carbon footpring points - Private</title>
    <script src="main.js" defer></script>
    <style>
      html {
        font-size: 22px;
      }
      body {
        background-color: black;
        color: whitesmoke;
      }
      input:in-range {
        background-color: aquamarine;
      }
      input:out-of-range {
        background-color: rgb(235, 92, 92);
      }
      input[type="text"]:valid {
        background-color: aquamarine;
      }
    </style>
  </head>
  <body>
    <form id="form">
      <fieldset>
        <legend>What is your carbon footprint</legend>

        <div>
          <label for="">First Name:</label>
          <input type="text" name="firstname" maxlength="20" required />
        </div>
        <div>
          <label for="">Last Name:</label>
          <input type="text" name="lastname" maxlength="20" required />
        </div>
        <div>
          <label for="">Count the members of your household:</label>
          <input type="number" name="hmembers" min="1" max="6" required />
        </div>
        <div>
          <label for="">Consider the size of your house:</label>
          <!-- <input type="text" name="hsize" required /> -->
          <select name="hsize" required>
            <option value="">--- Please enter size of home---</option>
            <option value="large">Large</option>
            <option value="medium">Medium</option>
            <option value="small">Small</option>
            <option value="apartment">Apartment</option>
          </select>
        </div>

        <button type="submit">Submit</button>
      </fieldset>
    </form>

    <div id="output"></div>
  </body>
</html>

<!-- what does required do?
required: simple form validation -->
